name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: claimsarathi
          POSTGRES_PASSWORD: claimsarathi
          POSTGRES_DB: claimsarathi
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claimsarathi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://claimsarathi:claimsarathi@localhost:5432/claimsarathi?schema=public
      JWT_SECRET: ci-test-secret
      VITE_API_BASE_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build --workspace @claimsarathi/shared

      - name: Generate Prisma client
        run: npm run db:generate --workspace @claimsarathi/api

      - name: Run database migrations
        run: npm run db:migrate:deploy --workspace @claimsarathi/api

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
