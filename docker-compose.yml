services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claimsarathi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claimsarathi}
      POSTGRES_DB: ${POSTGRES_DB:-claimsarathi}
    ports:
      - "5432:5432"
    volumes:
      - claimsarathi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claimsarathi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-claimsarathi}:${POSTGRES_PASSWORD:-claimsarathi}@postgres:5432/${POSTGRES_DB:-claimsarathi}?schema=public
      API_PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      STORAGE_DRIVER: local
      STORAGE_LOCAL_ROOT: /repo/apps/api/uploads
      SMS_PROVIDER: console
      EMAIL_PROVIDER: console
    ports:
      - "4000:4000"
    volumes:
      - claimsarathi_uploads:/repo/apps/api/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:4000}
    ports:
      - "5173:5173"

volumes:
  claimsarathi_pgdata:
  claimsarathi_uploads:
